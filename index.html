<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="utils.css">

<body>
    <div class="container flex bg-black">
        <div class="left bg-black">
            <div class="close">
                <img src="cross.svg" alt="" srcset="">
            </div>
            <div class="home bg-grey rounded m-1 p-1">
                <div class="logo"><img class="invert" src="logo.svg" alt=""></div>
                <ul>
                    <li><img class="invert" src="home.svg" alt="home">Home</li>
                    <li><img class="invert" src="search.svg" alt="search">Search</li>
                </ul>
            </div>
            <div class="library bg-grey rounded m-1 p-1">
                <div class="heading">

                    <h2> Your Library </h2>
                </div>

                <div class="songlist">
                    <ul>
                    </ul>
                </div>

                <div class="footer">
                    <div>
                        <a href="https://www.spotify.com/np-en/legal/">
                            <span>Legal</span>
                        </a>
                    </div>

                    <div>
                        <a href="https://www.spotify.com/np-en/safetyandprivacy/">
                            <span>Safety & Privacy Center</span>
                        </a>
                    </div>

                    <div>
                        <a href="https://www.spotify.com/np-en/legal/privacy-policy/">
                            <span>Privacy Policy</span>
                        </a>
                    </div>

                    <div>
                        <a href="https://www.spotify.com/np-en/legal/cookies-policy/">
                            <span>Cookies</span>
                        </a>
                    </div>

                    <div>
                        <a href="https://www.spotify.com/np-en/legal/privacy-policy/#s3">
                            <span>About Ads</span>
                        </a>
                    </div>

                    <div>
                        <a href="https://www.spotify.com/np-en/accessibility/">
                            <span>Accessibility</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <div class="right bg-grey rounded">
            <div class="header rounded">
                <div class="nav">
                    <div class="hamContainer">
                    <img class="hamburger" src="hamburger.svg" alt="">
                    <img class="invert" src="angle-left.svg" height="24px" width="24px" alt="">
                    <img class="invert" src="angle-right.svg" height="24px" width="24px" alt="">

                </div>
                </div>
                <div class="buttons">
                    <button class="signup-btn">Sign up</button>
                    <button class="login-btn">Log in</button>
                </div>
            </div>
            <div class="softifyPlaylist">
                <h1>Softify Playlist</h1>
                <div class="cardContainer">
                    <div class="card">
                        <div class="play-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black">


                                <circle cx="12" cy="12" r="12" fill="#3BE276" />


                                <path d="M9 7.5V16.5L17 12L9 7.5Z" fill="black" />
                            </svg>
                        </div>
                        <img src="https://i.scdn.co/image/ab67616d00001e02ef174702264e13643fc76c9e" alt="" srcset="">
                        <h2>Happy Hits!</h2>
                        <p>Hits to boost your mood and fill you with happiness!</p>
                    </div>

                    <div class="card">
                        <div class="play-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black">


                                <circle cx="12" cy="12" r="12" fill="#3BE276" />


                                <path d="M9 7.5V16.5L17 12L9 7.5Z" fill="black" />
                            </svg>
                        </div>
                        <img src="https://i.scdn.co/image/ab67616d00001e02ef174702264e13643fc76c9e" alt="" srcset="">
                        <h2>Happy Hits!</h2>
                        <p>Hits to boost your mood and fill you with happiness!</p>
                    </div>
                </div>
                <div class="playbar">
                    <div class="seekbar">
                        <div class="circle">

                        </div>
                    </div>
                    <div class="songbar">


                        <div class="songinfo">

                        </div>
                        <div class="songbuttons">
                            <img id="previous" src="previous.svg" alt="" srcset="">
                            <img id="play" src="play.svg" alt="" srcset="">
                            <img id="next" src="next.svg" alt="" srcset="">

                        </div>

                        <div class="songtime">

                        </div>
                    </div>
                </div>
            </div>
            <script src="script.js"></script>
</body>

</html>
